name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - run: npm install
      - run: npm run build
      - run: npx cap init twinz com.twinz.app --web-dir=dist
      - run: npx cap add android
      - run: npx cap sync
      - uses: actions/upload-artifact@v4
        with: {name: android-app, path: android/app/build/outputs/apk/debug/app-debug.apk}
